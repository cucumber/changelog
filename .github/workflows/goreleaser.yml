name: goreleaser

permissions: {}

on:
  push:
    branches: [release/*]

jobs:
  build-and-maybe-release:
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Unshallow
        run: git fetch --prune --unshallow

      - name: Set up Go
        uses: actions/setup-go@424fc82d43fa5a37540bae62709ddcc23d9520d4 # v2.1.5
        with:
          go-version: 1.19.1

      - run: make install

      - name: Build
        uses: goreleaser/goreleaser-action@ff11ca24a9b39f2d36796d1fbd7a4e39c182630a #v3.1.0
        with:
          version: latest
          args: build --snapshot --rm-dist

      - name: Prepare release notes
        if: "startsWith(github.ref, 'refs/tags/')"
        run: ./dist/changelog_linux_amd64/changelog -f CHANGELOG.md show ${GITHUB_REF##*/} > release-notes.txt

      - name: Docker login
        if: "startsWith(github.ref, 'refs/tags/')"
        run: docker login -u '${{ secrets.DOCKER_HUB_USER }}' -p '${{ secrets.DOCKER_HUB_PASSWORD }}'

      - name: Release
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: goreleaser/goreleaser-action@b953231f81b8dfd023c58e0854a721e35037f28b # v2.9.1
        with:
          version: latest
          args: release --release-notes release-notes.txt --rm-dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
