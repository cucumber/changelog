version: "2"
linters:
  enable:
    - misspell
    - nakedret
  disable:
    - dupl
    - errcheck
    - gocyclo
    - gosec
    - staticcheck
    - unused
  settings:
    govet:
      disable:
        - composites
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
